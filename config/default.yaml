# Default config. Safe to commit. Per-deploy overrides go in config/local.yaml (or local.yml; gitignored).
# Final config = default.yaml deep-merged with local.yaml. Secrets (ES creds) live in .env.

elasticsearch:
  hosts: ["https://localhost:9200"]
  verify_certs: false
  ca_certs: null
  events_index: "logs-dshield_cowrie_sessions-default"
  enrichment_index: "enriched-dshield_cowrie_sessions-default"
  request_timeout: 60

llm:
  # provider: "ollama" (Ollama API) or "openai_compat" (LM Studio, vLLM, llama.cpp server)
  provider: "ollama"
  # base_url MUST be overridden in local.yaml.
  generation_model: "lmstudio-community/qwen2.5:7b-instruct-q4_K_M"
  embedding_model: "nomic-embed-text"
  request_timeout: 120
  max_retries: 2
  api_key: null   # only needed for openai_compat servers that require auth

worker:
  state_db: "/var/lib/dshield_vector_analysis/state.sqlite"
  page_size: 1000
  command_max_chars: 4000
  # Bump after editing either prompt to force re-enrichment. v3 = Phase 2 (cloud).
  prompt_version: "v3"
  initial_lookback_days: null
  log_level: "INFO"

# Phase 2 — cloud LLM escalation. Off by default; enable per-deploy in local.yaml.
cloud:
  enabled: false
  provider: "anthropic"
  base_url: null            # null = Anthropic public API
  model: "claude-sonnet-4-6"
  max_tokens: 1024
  request_timeout: 120
  daily_budget_usd: 5.0
  rpm_limit: 10
  triage:
    confidence_max: 5           # enrich: escalate when local confidence is <= this (1-10)
    escalate_confidence_max: 7  # escalate cmd: only re-triage novel docs with confidence <= this
    sample_rate: 0.01           # 1% random sampling for quality monitoring
    base64_min_run: 200         # length threshold for "suspicious base64 blob"
    suspicious_tlds:
      - xyz
      - top
      - tk
      - ml
      - ga
      - cf
      - gq
      - club
      - icu
      - buzz
      - monster
      - rest
      - bar
      - fit
      - online
      - site
      - stream
      - cam
      - zip
      - exe
    novel_embedding_threshold: 0.5  # escalate when novelty_score >= this
  pricing:
    # USD per 1M tokens. Update to match the model you point at.
    input_per_mtok: 3.0
    output_per_mtok: 15.0

prompts:
  command_enrichment: "config/prompts/command_enrichment.txt"
  command_deep_dive:  "config/prompts/command_deep_dive.txt"

# Phase 3 — HDBSCAN clustering + novelty scoring. Run independently of enrich.
cluster:
  min_cluster_size: 5
  min_samples: 2
  page_size: 1000
  batch_size: 200
  # null = derive from enrichment_index (replace trailing -default with -clusters-default)
  clusters_index: null
