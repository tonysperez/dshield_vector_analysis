# Default config. Safe to commit. Per-deploy overrides go in config/local.yaml (or local.yml; gitignored).
# Final config = default.yaml deep-merged with local.yaml. Secrets (ES creds) live in .env.

elasticsearch:
  hosts: ["https://localhost:9200"]
  verify_certs: false
  ca_certs: null
  request_timeout: 60

  # All index names are nested per source so adding a new sensor (webhoneypot,
  # dshield, etc.) is a sibling block, not a flat rename. Layout:
  #   <aspect>-dshield.<source>.<stream>-<namespace>
  # aspects: logs (raw) / enriched / rollup / clusters
  indexes:
    cowrie:
      sessions_raw:      "logs-dshield.cowrie.session-default"
      commands:          "enriched-dshield.cowrie.command-default"
      command_clusters:  "clusters-dshield.cowrie.command-default"
      sessions_rollup:   "rollup-dshield.cowrie.session-default"
      session_clusters:  "clusters-dshield.cowrie.session-default"
      ips_rollup:        "rollup-dshield.cowrie.source_ip-default"
      ip_clusters:       "clusters-dshield.cowrie.source_ip-default"
      # Multi-session campaigns mined by `mine campaigns`. Distinct from
      # session_clusters (each centroid there is a "playbook"). See
      # docs/PLAYBOOKS_AND_CAMPAIGNS.md.
      campaigns:         "campaigns-dshield.cowrie-default"

llm:
  # provider: "ollama" (Ollama API) or "openai_compat" (LM Studio, vLLM, llama.cpp server)
  provider: "ollama"
  # base_url MUST be overridden in local.yaml.
  generation_model: "qwen/qwen3.5-9b"
  embedding_model: "text-embedding-nomic-embed-text-v1.5@q8_0"
  request_timeout: 600
  max_retries: 2
  api_key: null   # only needed for openai_compat servers that require auth
  # Fields prepended to the raw command before embedding (enrich-then-embed).
  # Empty list = embed raw command only. Changes to this list (and to
  # embedding_model above) flow into embed_config_hash automatically — no
  # manual version bump required. Run `reembed` after editing to refresh
  # the embeddings without re-running the LLM.
  embed_context:
    - intent
    - tactics
    - techniques
    - description

worker:
  state_db: "/var/lib/dshield_prism/state.sqlite"
  page_size: 1000
  command_max_chars: 4000
  initial_lookback_days: null
  log_level: "INFO"
  # When true, the cache key carries two auto-derived hashes:
  #   - llm_config_hash:   prompt-file content + LLM-side cooccurrence params
  #   - embed_config_hash: llm.embed_context + llm.embedding_model +
  #                        cooccurrence.embed_cooccurrence toggle
  # Editing any of those then invalidates the appropriate cache side on
  # the next pipeline run. The embed-only side can be refreshed by
  # `reembed` without an LLM call. Flip to `false` to bypass and treat
  # all rows as fresh — useful when LLM budget is tight and a config
  # edit landed; bless or wipe the cache manually as needed.
  # ROADMAP issue #7.
  cache_auto_invalidate: true

# Cloud LLM escalation. Off by default; enable per-deploy in local.yaml.
cloud:
  enabled: false
  provider: "anthropic"
  base_url: null            # null = Anthropic public API
  model: "claude-sonnet-4-6"
  max_tokens: 1024
  request_timeout: 120
  daily_budget_usd: 5.0
  rpm_limit: 10
  triage:
    # Was 6 (modal local-confidence value, escalated 70% of corpus and burnt
    # daily_budget_usd before noon). Lowered to 4 so we escalate "actually
    # low confidence" not "model's default floor." See ROADMAP issue #4.
    confidence_max: 4           # enrich: escalate when local confidence <= this (1-10)
    escalate_confidence_max: 8  # escalate cmd: only re-triage novel docs with confidence <= this
    sample_rate: 0.01           # 1% random sampling for quality monitoring
    base64_min_run: 200         # length threshold for "suspicious base64 blob"
    # File extensions removed (`zip`, `exe`): they are far more common as
    # filename suffixes than as TLDs, and the host-context anchor on
    # `_TLD_RE` (src/enrich/triage.py) reduces false positives further. See
    # ROADMAP issue #4.
    suspicious_tlds:
      - xyz
      - top
      - tk
      - ml
      - ga
      - cf
      - gq
      - club
      - icu
      - buzz
      - monster
      - rest
      - bar
      - fit
      - online
      - site
      - stream
      - cam
    novel_embedding_threshold: 0.5  # escalate when novelty_score >= this
    novel_confidence_min: 4         # but only when local confidence is at least
                                    # this — gates out the encoding-artifact tail
                                    # (raw ELF bytes etc. that score novelty=1.0
                                    # with confidence=1). See ROADMAP issue #3.
    # M3.A: intel-aware escalation gate. When true, before dispatching
    # a triaged command to the cloud, consult the intel verdicts on
    # its source IPs. Skip cloud when:
    #  - all source IPs are `override_applied=authoritative_clean`
    #    (researchers like ShadowServer), OR
    #  - all source IPs have malicious_provider_count >= 2 AND every
    #    triage_reason is a gateable (LLM-uncertainty) reason — not
    #    a command-shape reason like base64_blob/ip_literal/rare_tld.
    # Disable to revert to non-intel-aware escalation.
    intel_aware: true
  pricing:
    # USD per 1M tokens. Update to match the model you point at.
    input_per_mtok: 3.0
    output_per_mtok: 15.0

# Per-command session-co-occurrence context. For each cache-miss command we
# query ES for the sessions that ran it, then pull the most-frequent OTHER
# commands those sessions ran. Top-K are passed to the LLM (and optionally
# appended to the embed input) so enrichment sees the command in context.
cooccurrence:
  enabled: true
  session_sample_size: 50          # max sessions sampled per command
  top_k: 8                         # co-occurring commands surfaced
  min_sessions: 3                  # skip when command has fewer sampled sessions
  # The old binary `max_corpus_session_ratio: 0.40` boilerplate cutoff was
  # replaced with continuous TF-IDF weighting (ROADMAP issue #6). Setting
  # the field here is a benign no-op — kept out of the default for clarity.
  embed_cooccurrence: true         # also append to embed text; folded into embed_config_hash automatically

prompts:
  command_enrichment:        "config/prompts/command_enrichment.txt"
  command_deep_dive:         "config/prompts/command_deep_dive.txt"
  playbook_name:             "config/prompts/playbook_name.txt"
  # Pass-2 of `name playbooks`: re-prompts the LLM when multiple clusters
  # end up with the same pass-1 name, asking it to produce distinct
  # names that capture what makes each cluster substantively different.
  # Comment out to skip pass 2 (collisions keep their pass-1 names).
  # ROADMAP issue #10.
  playbook_disambiguate:     "config/prompts/playbook_disambiguate.txt"
  # Used by the console's /compare page (and the explain_cluster_pair CLI
  # script's --explain flag). Local LLM only.
  cluster_pair_explanation:  "config/prompts/cluster_pair_explanation.txt"

# HDBSCAN over command embeddings.
command_cluster:
  min_cluster_size: 5
  min_samples: 2
  page_size: 1000
  batch_size: 200
  # Weight of scalar feature block (occurrence_count, unique_source_ips, confidence,
  # session_reuse_rate) appended to the L2-normalized embedding matrix.
  # Semantic signal (1.0 norm) dominates; scalars break ties. Tune 0.0–0.15.
  scalar_weight: 0.05

# Session-level rollup + clustering + playbook naming.
session:
  # Bump when mean-pool inputs change to force full re-rollup.
  embed_version: "v1"
  # HDBSCAN params — smaller defaults than commands because session counts are lower.
  cluster_min_cluster_size: 3
  # min_samples=1 collapses HDBSCAN's mutual-reachability distance to raw
  # cosine distance (single-linkage), which on a heavy-duplicate corpus can
  # let one mega-cluster swallow the bulk. ROADMAP issue #5.
  cluster_min_samples: 2
  # Weight of the scalar feature block in the session cluster matrix.
  # Scalars: command_count, unique_commands, login_success_rate, mean_novelty_score.
  cluster_scalar_weight: 0.05
  page_size: 1000
  batch_size: 200
  # Max unique commands sampled per playbook (session cluster) for LLM name generation.
  playbook_sample_commands: 15
  # Cosine-similarity threshold for merging HDBSCAN clusters into a single
  # playbook. Two clusters whose centroids are at least this similar (single-
  # linkage union-find) collapse into one playbook before LLM naming. Fixes
  # the failure mode where HDBSCAN splits a behaviourally-identical group
  # across two clusters (verified by `scripts/diagnose_centroid_similarity.py`).
  # 1.0 disables merging (1 cluster = 1 playbook). Lowering past ~0.93 risks
  # transitive mega-merges through borderline edges; 0.96 is a safe default.
  # Future tightening: a complete-linkage guard (require every pair in a
  # merged group to clear `threshold - δ`) — not implemented yet, tracked in README.
  playbook_merge_threshold: 0.96

# IP-level rollup + clustering.
ip:
  embed_version: "v1"
  cluster_min_cluster_size: 3
  # See session.cluster_min_samples for rationale. ROADMAP issue #5.
  cluster_min_samples: 2
  # Weight on the BEHAVIOR sub-block (total_sessions, login_success_rate,
  # mean_novelty_score, mean_session_duration_s). Subdued because these
  # break ties on the embedding axis.
  cluster_scalar_weight: 0.05
  # Weight on the ATTRIBUTION sub-block (country one-hot, ASN bucket,
  # credential hash). Slightly hotter than behavior because these are
  # attribution signals, not noise — keeps two-bots-running-Mirai-from-
  # different-ASNs from clustering together. ROADMAP issue #8.
  cluster_attribution_weight: 0.10
  # Top-N ASNs each get a dedicated one-hot column in the ASN bucket;
  # all others share a pooled "other" column. Computed via a corpus-wide
  # ES terms agg at cluster time.
  attribution_top_asns: 50
  # Credential feature-hash dimension. Each unique (user:pass) the IP
  # tried is hashed into one of K bins; the column is that bin's share
  # of the IP's credential set (sum=1 per row).
  attribution_cred_hash_dim: 16
  page_size: 1000
  batch_size: 200

# External threat-intel subsystem (ROADMAP "Research-mode strategic gaps" A).
# Runs alongside the enrichment pipeline; writes per-artifact intel docs to
# project-owned `intel-*-default` indices. Disabled by default — flip
# `enabled: true` in local.yaml after configuring providers + never-query
# CIDRs. Milestone 1 ships three free-tier IP providers (Tor exit list,
# Spamhaus DNS, ISC daily feed); other artifact kinds + providers land in
# subsequent milestones.
intel:
  enabled: false

  # Project-owned intel indices, one per artifact kind. Pre-allocated so
  # adding a kind later doesn't require a config migration.
  indexes:
    ip:     "intel-dshield-ip-default"
    url:    "intel-dshield-url-default"
    domain: "intel-dshield-domain-default"
    hash:   "intel-dshield-hash-default"

  providers:
    tor:
      enabled: true
      exit_list_url: "https://check.torproject.org/torbulkexitlist"
      refresh_minutes: 60
      cache_file: "/var/lib/dshield_prism/intel_tor_exits.txt"
    # abuse.ch FeodoTracker — active malware C2 IPs. HTTP-based bulk
    # download (no DNS-blocklist resolver gotchas). High precision;
    # the `_recommended` endpoint pre-filters to currently-active C2.
    feodotracker:
      enabled: true
      feed_url: "https://feodotracker.abuse.ch/downloads/ipblocklist_recommended.json"
      refresh_minutes: 60
      cache_file: "/var/lib/dshield_prism/intel_feodotracker.json"
    # FireHOL Level 1 — aggregated IP reputation across hundreds of
    # upstream feeds (CINS, DROP/EDROP, BinaryDefense, AlienVault,
    # EmergingThreats, …). The strictest tier — very low FP. Single
    # plain-text netset file with mixed IPs and CIDRs.
    firehol:
      enabled: true
      feed_url: "https://iplists.firehol.org/files/firehol_level1.netset"
      refresh_minutes: 360
      cache_file: "/var/lib/dshield_prism/intel_firehol_level1.netset"
    isc:
      enabled: true
      sources_url: "https://isc.sans.edu/api/sources/attacks/2000?json"
      refresh_minutes: 360
      cache_file: "/var/lib/dshield_prism/intel_isc_top.json"
    # GreyNoise Community — partitions internet-background-radiation
    # from targeted activity. The highest-value single integration for
    # research mode. Free tier is **50 lookups per week** (much tighter
    # than the "10k/month" headline suggests); the priority queue
    # spends the budget on highest-novelty artifacts first. The cache
    # TTL matches the weekly cycle — 7 days — so resolved artifacts
    # stay resolved and the budget always goes to fresh, high-novelty
    # IPs. Requires GREYNOISE_API_KEY in .env. Set enabled: false to
    # disable explicitly; otherwise the provider auto-skips when no
    # key is set.
    greynoise:
      enabled: true
      base_url: "https://api.greynoise.io"
      request_timeout_seconds: 8.0
      daily_budget: 6
      min_inter_call_seconds: 1.0
      ttl_days: 7
    # AbuseIPDB — abuse-confidence score + report count + ISP. Free
    # tier 1000 checks/day. Requires ABUSEIPDB_API_KEY in .env;
    # auto-skipped when unset.
    abuseipdb:
      enabled: true
      base_url: "https://api.abuseipdb.com"
      request_timeout_seconds: 8.0
      daily_budget: 900
      min_inter_call_seconds: 0.0
      max_age_days: 90
      ttl_days: 3
    # M4: URL providers (abuse.ch family — no key, unmetered).
    urlhaus:
      enabled: true
      feed_url: "https://urlhaus.abuse.ch/downloads/csv_online/"
      refresh_minutes: 60
      cache_file: "/var/lib/dshield_prism/intel_urlhaus.csv"
    threatfox:
      enabled: true
      base_url: "https://threatfox-api.abuse.ch/api/v1/"
      request_timeout_seconds: 8.0
      min_inter_call_seconds: 0.5
      ttl_days: 3

  # Priority-queue weights. `priority = novelty_w * novelty +
  #                                     low_conf_w * (1 - confidence/10) +
  #                                     centrality_w * centrality_norm +
  #                                     recency_w * recency_decay`.
  # Local novelty dominates by design (per 2026-05-16 design decision):
  # scarce free-tier lookups go first to artifacts most likely to be
  # research discoveries.
  priority:
    novelty_w: 0.50
    low_conf_w: 0.20
    centrality_w: 0.15
    recency_w: 0.15
    recency_half_life_hours: 168.0

  # CIDRs that MUST NOT be queried against external feeds. RFC1918 +
  # loopback + link-local + multicast + reserved are already filtered
  # at the canonicaliser (src/enrich/intel/artifact.py); add the
  # operator's egress IP, the SO box's public IP, any peer research
  # sensors, and any user-controlled infrastructure here.
  never_query_cidrs: []

  # ES `size:` parameter for the discovery scans (IP rollup search,
  # threat.indicator nested terms agg). NOT an artifact-dispatch cap
  # — provider budgets are enforced at the provider level
  # (RateLimit.daily_budget). Unmetered bulk providers (Tor / ISC /
  # FireHOL / FeodoTracker / URLhaus) shouldn't be artificially
  # limited.
  max_per_run: 5000
