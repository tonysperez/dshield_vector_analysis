description: >-
  Search input for lines matching a pattern. In Cowrie attack chains:
  reconnaissance (`cat /etc/passwd | grep root`), output filtering
  (`ps -ef | grep [Mm]iner`), and config probing.
flags:
  "-i": "Case-insensitive match."
  "--ignore-case": "Same as -i."
  "-v": "Invert match — show lines that DON'T match."
  "--invert-match": "Same as -v."
  "-r": "Recursive search through directory trees."
  "-R": "Recursive, following symlinks."
  "--recursive": "Same as -r."
  "-l": "Print only filenames of files with matches."
  "-L": "Print only filenames of files without matches."
  "-c": "Count matching lines per file."
  "--count": "Same as -c."
  "-n": "Show line numbers."
  "--line-number": "Same as -n."
  "-H": "Show the filename with each match."
  "--with-filename": "Same as -H."
  "-h": "Suppress filename in output."
  "-q": "Quiet — no output, exit status only."
  "--quiet": "Same as -q."
  "-E": "Extended regular expressions."
  "--extended-regexp": "Same as -E."
  "-F": "Treat pattern as fixed string (no regex)."
  "--fixed-strings": "Same as -F."
  "-P": "Perl-compatible regular expressions."
  "--perl-regexp": "Same as -P."
  "-o": "Print only the matched part of each line."
  "--only-matching": "Same as -o."
  "-A": "Print N lines of trailing context."
  "--after-context": "Same as -A."
  "-B": "Print N lines of leading context."
  "--before-context": "Same as -B."
  "-C": "Print N lines of both leading and trailing context."
  "--context": "Same as -C."
  "-w": "Whole-word match."
  "--word-regexp": "Same as -w."
  "-x": "Whole-line match."
  "--line-regexp": "Same as -x."
