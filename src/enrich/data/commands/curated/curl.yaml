description: >-
  HTTP/HTTPS/FTP/SCP/many-other-protocols data-transfer client. Common in
  attacker dropper chains as a more-capable wget alternative; the `-fsSL`
  combination is a near-universal malware-installer fingerprint (silent
  fetch + follow redirects + fail on HTTP error).
flags:
  "-o": "Write output to the specified file (lowercase)."
  "-O": "Save with the URL's remote filename (uppercase)."
  "-s": "Silent — suppress progress meter and error messages. Common evasion flag."
  "-S": "Show errors even with -s. Often combined: `-sS`."
  "-f": "Fail silently on HTTP error codes (no output)."
  "-L": "Follow redirects. Required for any link-shortened or CDN-fronted dropper."
  "-k": "Allow insecure TLS connections."
  "--insecure": "Same as -k. **Strong malware indicator**."
  "-u": "Set username:password for server auth."
  "--user": "Same as -u."
  "-d": "Send POST data."
  "--data": "Same as -d."
  "--data-binary": "Send POST data with no encoding."
  "-X": "Set the HTTP method explicitly (GET/POST/PUT/DELETE)."
  "--request": "Same as -X."
  "-H": "Add a custom HTTP request header."
  "--header": "Same as -H."
  "-A": "Set the User-Agent."
  "--user-agent": "Same as -A."
  "-b": "Pass cookies."
  "--cookie": "Same as -b."
  "-c": "Write received cookies to a file."
  "--cookie-jar": "Same as -c."
  "-e": "Set the Referer header."
  "--referer": "Same as -e."
  "-x": "Use the given HTTP proxy."
  "--proxy": "Same as -x."
  "--socks5": "Use a SOCKS5 proxy."
  "-I": "HEAD request only — check existence without downloading."
  "--head": "Same as -I."
  "-v": "Verbose."
  "--verbose": "Same as -v."
  "-w": "Write-out format string for stats. Often `%{http_code}` for status."
  "--write-out": "Same as -w."
  "-T": "Upload a file with PUT."
  "--upload-file": "Same as -T."
  "-Y": "Throttle below this byte/sec."
  "--max-time": "Maximum time the whole operation may take (seconds)."
  "--connect-timeout": "Maximum time to establish the connection."
  "--retry": "Retry on transient failure."
  "--retry-delay": "Seconds between retries."
  "-4": "IPv4 only."
  "-6": "IPv6 only."
  "-h": "Help."
  "-V": "Version."
